name: "JEP Event Artifact for GitHub"
description: "Generate JEP v0.6 event artifacts for GitHub workflow activity"
author: "hjs-spec"

inputs:
  mode:
    description: "Generation mode: artifact or api"
    required: false
    default: "artifact"
  verb:
    description: "JEP verb: J, D, T, or V"
    required: false
    default: "J"
  actor:
    description: "Actor identifier"
    required: false
    default: ""
  subject:
    description: "Event subject"
    required: false
    default: ""
  relation:
    description: "Workflow relation note"
    required: false
    default: "workflow-event"
  audience:
    description: "Intended audience or validation context"
    required: false
    default: ""
  jep_api_url:
    description: "Optional JEP API URL for api mode"
    required: false
    default: ""
  upload_artifact:
    description: "Upload the generated event artifact"
    required: false
    default: "true"

outputs:
  jep_event_hash:
    description: "Algorithm-tagged JEP event hash"
  jep_event_json:
    description: "Generated JEP event JSON"
  validation_result_json:
    description: "JEP-style validation result JSON"
  artifact_path:
    description: "Local path to the generated artifact"

runs:
  using: "node20"
  main: "dist/index.js"

branding:
  icon: "check-circle"
  color: "blue"
